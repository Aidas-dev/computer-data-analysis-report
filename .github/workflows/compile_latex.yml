name: Compile LaTeX Report

on:
  push:
    branches:
      - main
    paths:
      - 'report/tex/**'
      - '.github/workflows/compile_latex.yml'
  pull_request:
    paths:
      - 'report/tex/**'

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: report/tex/
          compiler: latexmk
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Upload PDF file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Data_Center_Report
          path: report/tex/main.pdf
